    if (el.t === "text") return <div key={el.id} style={Object.assign({}, base, { fontFamily: "'Inter',sans-serif", fontSize: el.fs, fontWeight: el.fw, color: el.c, lineHeight: 1.3, whiteSpace: "pre-wrap", userSelect: "none" })} onClick={clk} onMouseDown={md}>{el.tx}</div>;
    if (el.t === "logo") return (
      <div key={el.id} style={Object.assign({}, base, { height: el.h })} onClick={clk} onMouseDown={md}>
        <Logo white={el.wh} w={el.w} h={el.h} />
        {handles}
      </div>
    );
    return null;
  }

  function starPoints(w, h) {
    var cx = w / 2, cy = h / 2, or2 = Math.min(w, h) / 2 - 2, ir = or2 * 0.4, pts = [];
    for (var i = 0; i < 10; i++) { var a = Math.PI / 2 + i * Math.PI / 5; var r2 = i % 2 === 0 ? or2 : ir; pts.push(Math.round(cx + r2 * Math.cos(a)) + "," + Math.round(cy - r2 * Math.sin(a))); }
    return pts.join(" ");
  }

  var inp = { width: "100%", padding: "8px 12px", border: "1px solid " + C.g5, borderRadius: 5, fontFamily: "inherit", fontSize: 13, color: C.b, background: C.w, boxSizing: "border-box" };
  var lbl = { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: C.g8, marginBottom: 10 };
  function tbtn(a) { return { flex: 1, padding: "8px 6px", fontFamily: "inherit", fontSize: 12, fontWeight: 500, border: "none", background: a ? C.a : C.w, color: a ? C.w : C.g9, cursor: "pointer" }; }
  var btn1 = { display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "10px 20px", fontFamily: "inherit", fontSize: 14, fontWeight: 600, background: C.a3, color: C.w, border: "none", borderRadius: 5, cursor: "pointer", width: "100%" };
  var btn2 = { display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "8px 14px", fontFamily: "inherit", fontSize: 12, fontWeight: 500, background: C.w, color: C.g9, border: "1px solid " + C.g5, borderRadius: 5, cursor: "pointer", width: "100%" };
  var sec = { borderBottom: "1px solid " + C.g6, paddingBottom: 16, marginBottom: 14 };
  var tabs = ["erstellen", "vorlagen", "elemente", "ebenen"];
  var tabN = { erstellen: "Erstellen", vorlagen: "Vorlagen", elemente: "Elemente", ebenen: "Ebenen" };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", fontFamily: "'Inter',sans-serif", fontFeatureSettings: "'cv06' on,'cv04' on,'cv02' on,'cv01' on,'cv03' on,'cv05' on,'case' on", background: C.g50, color: C.b }}>
      <style>{"@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap'); *, *::before, *::after { box-sizing: border-box; } button, input, textarea, select { font-family: inherit; font-feature-settings: inherit; }"}</style>
      <input type="file" ref={fRef} accept="image/*" onChange={onFile} style={{ display: "none" }} />
      <input type="file" ref={assetRef} accept="image/*" onChange={onAssetFile} style={{ display: "none" }} />

      {/* Login */}
      {loginOpen && <div style={{ position: "fixed", inset: 0, background: "rgba(0,48,94,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999 }}>
        <div style={{ background: C.w, borderRadius: 8, padding: 32, width: 340 }}>
          <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 16 }}>Admin-Zugang</div>
          <input type="password" value={pw} onChange={function(e) { setPw(e.target.value); }} placeholder="Passwort" onKeyDown={function(e) { if (e.key === "Enter") doLogin(); }} style={Object.assign({}, inp, { marginBottom: 12, borderColor: pwErr ? C.r : C.g5 })} />
          {pwErr && <div style={{ fontSize: 12, color: C.r, marginBottom: 8 }}>Falsches Passwort</div>}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={function() { setLoginOpen(false); }} style={btn2}>Abbrechen</button>
            <button onClick={doLogin} style={btn1}>Anmelden</button>
          </div>
          <div style={{ marginTop: 10, fontSize: 11, color: C.g8, textAlign: "center" }}>Demo: vonpoll2024</div>
        </div>
      </div>}

      {/* Header */}
      <div style={{ background: C.b, padding: "0 32px", height: 64, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <img src={VP_LOGO_URI} alt="VON POLL IMMOBILIEN" style={{ height: 30, width: "auto", display: "block" }} />
          <span style={{ width: 1, height: 20, background: "rgba(255,255,255,0.3)" }} />
          <span style={{ color: C.w, fontSize: 16, fontWeight: 600 }}>Michelles Editor</span>
          {admin && <span style={{ fontSize: 10, padding: "2px 8px", background: C.g, color: C.b, borderRadius: 3, fontWeight: 700 }}>ADMIN</span>}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {!admin && <button onClick={function() { setLoginOpen(true); }} style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", color: "rgba(255,255,255,0.8)", fontSize: 12, padding: "5px 12px", borderRadius: 5, cursor: "pointer" }}>Admin</button>}
          {admin && <button onClick={function() { setAdmin(false); }} style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", color: "rgba(255,255,255,0.8)", fontSize: 12, padding: "5px 12px", borderRadius: 5, cursor: "pointer" }}>Abmelden</button>}
        </div>
      </div>

      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        {/* Sidebar */}
        <div style={{ width: 350, background: C.w, borderRight: "1px solid " + C.g5, overflowY: "auto", display: "flex", flexDirection: "column" }}>
          <div style={{ display: "flex", borderBottom: "1px solid " + C.g5, flexShrink: 0 }}>
            {tabs.map(function(t) { return <button key={t} onClick={function() { setPanel(t); }} style={{ flex: 1, padding: "11px 2px", fontSize: 10, fontWeight: 600, cursor: "pointer", border: "none", borderBottom: panel === t ? "2px solid " + C.a : "2px solid transparent", background: C.w, color: panel === t ? C.a : C.g8, letterSpacing: "0.02em" }}>{tabN[t]}</button>; })}
          </div>
          <div style={{ padding: 20, flex: 1 }}>

            {/* ═══ TAB 1: ERSTELLEN ═══ */}
            {panel === "erstellen" && <div>
              <div style={sec}>
                <div style={lbl}>Format wahlen</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {Object.values(FMT).map(function(x) { return (
                    <button key={x.id} onClick={function() { swFmt(x.id); setPanel("erstellen"); }} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", borderRadius: 5, cursor: "pointer", border: fmt === x.id ? "2px solid " + C.a : "2px solid " + C.g2, background: fmt === x.id ? C.a5 : C.w, textAlign: "left" }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: C.g9 }}>{x.n}</span>
                      <span style={{ fontSize: 11, color: C.g8 }}>{x.d}</span>
                    </button>

                </div>
              </div>
              <div style={sec}>
                <div style={lbl}>Objektdaten laden</div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input value={objIn} onChange={function(e) { setObjIn(e.target.value); }} placeholder="VP-2024-001" style={inp} onKeyDown={function(e) { if (e.key === "Enter") doLoad(); }} />
                  <button onClick={doLoad} style={Object.assign({}, btn1, { width: "auto", padding: "8px 14px", fontSize: 12 })}>Laden</button>
                </div>
                {obj && <div style={{ marginTop: 8, padding: 8, background: "#e8f5e9", borderRadius: 5, fontSize: 12, color: "#2e7d32" }}>OK: {obj.title}</div>}
                <div style={{ marginTop: 6, fontSize: 10, color: C.g8 }}>Demo: VP-2024-001, -002, -003</div>
              </div>
              {admin && <div style={{ padding: 12, background: "#fff3e0", borderRadius: 5 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.g, marginBottom: 6 }}>Admin: Hintergrundfarbe</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {COLORS.map(function(c) { return <button key={c.h} onClick={function() { setBg(c.h); }} style={{ width: 26, height: 26, borderRadius: "50%", border: bg === c.h ? "3px solid " + C.b : "2px solid rgba(0,0,0,0.08)", background: c.h, cursor: "pointer" }} />; })}
                </div>
              </div>}
            </div>}

            {/* ═══ TAB 2: VORLAGEN ═══ */}
            {panel === "vorlagen" && <div>
              <div style={sec}>
                <div style={lbl}>Format</div>
                <div style={{ display: "flex", border: "1px solid " + C.g5, borderRadius: 5, overflow: "hidden" }}>
                  {Object.values(FMT).map(function(x) { return <button key={x.id} onClick={function() { setFmt(x.id); }} style={tbtn(fmt === x.id)}>{x.n.replace(" Post", "")}</button>; })}
                </div>
              </div>
              <div style={lbl}>Vorlagen ({ftpls.length})</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
                {ftpls.map(function(t) { return (
                  <div key={t.id} style={{ position: "relative" }}>
                    <button onClick={function() { loadTpl(t); }} style={{ border: tplId === t.id ? "2px solid " + C.a : "2px solid " + C.g2, borderRadius: 5, cursor: "pointer", overflow: "hidden", background: C.g1, padding: 0, width: "100%" }}>
                      <div style={{ aspectRatio: "4/3", background: t.bg, position: "relative", overflow: "hidden" }}>
                        {t.els.filter(function(e) { return e.t === "text"; }).slice(0, 2).map(function(e, i) { return <div key={i} style={{ position: "absolute", left: 5, top: 5 + i * 12, fontSize: 5, color: e.c, fontWeight: e.fw, whiteSpace: "nowrap", overflow: "hidden", maxWidth: "85%" }}>{e.tx}</div>; })}
                      </div>
                      <div style={{ fontSize: 11, fontWeight: 500, padding: "5px 6px", textAlign: "center", color: C.g9, background: C.w }}>{t.n}</div>
                    </button>
                    {admin && <button onClick={function() { setTpls(function(p) { return p.filter(function(x) { return x.id !== t.id; }); }); if (tplId === t.id) goBlank(); }} style={{ position: "absolute", top: 4, right: 4, width: 18, height: 18, borderRadius: "50%", background: "rgba(0,0,0,0.5)", color: C.w, border: "none", fontSize: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>x</button>}
                  </div>
                ); })}
              </div>
              {admin && <div style={{ padding: 12, background: "#fff3e0", borderRadius: 5 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.g, marginBottom: 8 }}>Admin: Vorlage speichern</div>
                {tplId && <button onClick={updTpl} style={Object.assign({}, btn1, { marginBottom: 8, fontSize: 12 })}>{(tpls.find(function(t) { return t.id === tplId; }) || {}).n || ""} aktualisieren</button>}
                <div style={{ display: "flex", gap: 6 }}>
                  <input value={newN} onChange={function(e) { setNewN(e.target.value); }} placeholder="Neuer Name" style={inp} onKeyDown={function(e) { if (e.key === "Enter") saveTpl(); }} />
                  <button onClick={saveTpl} style={Object.assign({}, btn1, { width: "auto", padding: "8px 12px", fontSize: 12, background: C.gr })}>+ Neu</button>
                </div>
                {msg && <div style={{ marginTop: 6, fontSize: 12, color: C.gr, fontWeight: 600 }}>{msg}</div>}
              </div>}
            </div>}

            {/* ═══ TAB 3: ELEMENTE ═══ */}
            {panel === "elemente" && <div>
              {/* Freie Formen */}
              <div style={sec}>
                <div style={lbl}>Freie Formen</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                  {SHAPES.map(function(sh) { return (
                    <button key={sh.id} onClick={function() { addShape(sh.id); }} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "10px 4px", borderRadius: 5, border: "1px solid " + C.g2, background: C.g1, cursor: "pointer" }}>
                      <ShapeIcon shape={sh.id} size={22} color={C.g9} />
                      <span style={{ fontSize: 9, color: C.g8, fontWeight: 500 }}>{sh.n}</span>
                    </button>
                  ); })}
                </div>
              </div>

              {/* Text */}
              <div style={sec}>
                <div style={lbl}>Text</div>
                <button onClick={addTx} style={btn2}>+ Text hinzufuegen</button>
              </div>

              {/* Logos */}
              <div style={sec}>
                <div style={lbl}>Logos</div>
                <button onClick={function() { addLogo(true); }} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "8px 10px", background: C.b7, border: "1px solid " + C.g2, borderRadius: 5, cursor: "pointer", marginBottom: 6 }}>
                  <div style={{ width: 56, height: 20, display: "flex", alignItems: "center" }}><Logo white={true} w={56} h={18} /></div>
                  <span style={{ fontSize: 12, fontWeight: 500, color: C.w }}>VP Logo weiss</span>
                </button>
                <button onClick={function() { addLogo(false); }} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "8px 10px", background: C.w, border: "1px solid " + C.g2, borderRadius: 5, cursor: "pointer" }}>
                  <div style={{ width: 56, height: 20, display: "flex", alignItems: "center" }}><Logo white={false} w={56} h={18} /></div>
                  <span style={{ fontSize: 12, fontWeight: 500, color: C.g9 }}>VP Logo blau</span>
                </button>
              </div>

              {/* Assets */}
              <div style={sec}>
                <div style={lbl}>Assets</div>
                {assets.map(function(a) { return (
                  <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <button onClick={function() { placeAsset(a); }} style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, padding: "7px 10px", background: C.g1, border: "1px solid " + C.g2, borderRadius: 5, cursor: "pointer", textAlign: "left" }}>
                      <div style={{ width: 28, height: 28, borderRadius: 4, flexShrink: 0, background: a.t === "rect" ? a.preview : C.b7, overflow: "hidden" }}>{a.t === "image" && <img src={a.preview} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />}</div>
                      <span style={{ fontSize: 11, fontWeight: 500, color: C.g9 }}>{a.n}</span>
                    </button>
                    {admin && <button onClick={function() { setAssets(function(p) { return p.filter(function(x) { return x.id !== a.id; }); }); }} style={{ padding: 3, background: "none", border: "none", color: C.r, cursor: "pointer", opacity: 0.5, fontSize: 12 }}>x</button>}
                  </div>
                ); })}
                {admin && <button onClick={function() { assetRef.current.click(); }} style={Object.assign({}, btn2, { marginTop: 4, background: "#fff3e0", borderColor: C.g + "40", color: C.g })}>+ Asset hochladen</button>}
              </div>

              {/* Bild hochladen */}
              <div>
                <div style={lbl}>Bild hochladen</div>
                <button onClick={function() { var n = { id: "img" + Date.now(), t: "image", x: 20, y: 20, w: 300, h: 200, src: null, lk: false, lb: "Hochgeladen" }; setEls(function(p) { return p.concat(n); }); setUpId(n.id); setSelId(n.id); fRef.current.click(); }} style={btn2}>
                  + Bild vom Computer
                </button>
              </div>
            </div>}

            {/* ═══ TAB 4: EBENEN ═══ */}
            {panel === "ebenen" && <div>
              <div style={lbl}>Ebenen ({els.length})</div>
              {els.length === 0 && <div style={{ textAlign: "center", padding: "24px 12px", color: C.g8, fontSize: 12 }}>Noch keine Elemente. Erstelle Elemente im "Elemente"-Tab.</div>}
              {els.slice().reverse().map(function(el, ri) {
                var idx = els.length - 1 - ri;
                return (
                <div key={el.id} onClick={function() { setSelId(el.id); }} style={{ display: "flex", alignItems: "center", gap: 4, padding: "7px 8px", borderRadius: 4, cursor: "pointer", background: selId === el.id ? C.a5 : C.w, border: "1px solid " + (selId === el.id ? C.a + "30" : C.g2), marginBottom: 3 }}>
                  <span style={{ width: 20, fontSize: 9, color: C.g8, textAlign: "center", flexShrink: 0 }}>{el.t === "text" ? "T" : el.t === "image" ? "IMG" : el.t === "logo" ? "LP" : el.t === "shape" ? "F" : "R"}</span>
                  <span style={{ fontSize: 11, fontWeight: 500, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", color: C.g9 }}>{el.t === "text" ? (el.tx || "").substring(0, 20) : el.id}</span>
                  {/* Move buttons */}
                  <button onClick={function(ev) { ev.stopPropagation(); moveLayer(el.id, 1); }} title="Nach oben" style={{ padding: "1px 4px", fontSize: 10, background: C.g1, border: "1px solid " + C.g2, borderRadius: 3, cursor: "pointer", color: C.g9 }}>^</button>
                  <button onClick={function(ev) { ev.stopPropagation(); moveLayer(el.id, -1); }} title="Nach unten" style={{ padding: "1px 4px", fontSize: 10, background: C.g1, border: "1px solid " + C.g2, borderRadius: 3, cursor: "pointer", color: C.g9 }}>v</button>
                  {/* Lock */}
                  {admin && <button onClick={function(ev) { ev.stopPropagation(); togLk(el.id); }} style={{ padding: "2px 5px", fontSize: 9, borderRadius: 3, border: "none", cursor: "pointer", background: el.lk ? "#fff3e0" : C.g1, color: el.lk ? C.g : C.g8, fontWeight: 600 }}>{el.lk ? "Locked" : "Open"}</button>}
                  {!admin && el.lk && <span style={{ fontSize: 8, color: C.g, flexShrink: 0, padding: "2px 4px", background: "#fff3e0", borderRadius: 3 }}>Locked</span>}
                  {/* Delete */}
                  {ok(el) && <button onClick={function(ev) { ev.stopPropagation(); del(el.id); }} style={{ padding: "1px 5px", background: "none", border: "none", color: C.r, cursor: "pointer", opacity: 0.5, fontSize: 12 }}>x</button>}
                </div>
              ); })}
            </div>}
          </div>
        </div>

        {/* Canvas */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, overflow: "auto" }}>
          <div onClick={function() { setSelId(null); }} style={{ width: f.w, height: f.h, position: "relative", background: bg, overflow: "hidden", transform: "scale(" + zoom + ")", transformOrigin: "center", boxShadow: "0 8px 24px rgba(0,48,94,0.16)", flexShrink: 0 }}>
            {els.map(rEl)}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 16 }}>
            <button onClick={function() { setZoom(function(z) { return Math.max(0.4, z - 0.1); }); }} style={Object.assign({}, btn2, { width: "auto", padding: "4px 10px" })}>-</button>
            <span style={{ fontSize: 12, color: C.g8, width: 40, textAlign: "center" }}>{Math.round(zoom * 100)}%</span>
            <button onClick={function() { setZoom(function(z) { return Math.min(2, z + 0.1); }); }} style={Object.assign({}, btn2, { width: "auto", padding: "4px 10px" })}>+</button>
            <span style={{ fontSize: 11, color: C.g8, marginLeft: 8 }}>{f.n} ({f.d})</span>
          </div>
        </div>

        {/* Properties */}
        <div style={{ width: 260, background: C.w, borderLeft: "1px solid " + C.g5, overflowY: "auto", padding: 20 }}>
          <div style={lbl}>Eigenschaften</div>

            </div>
            <div style={{ fontSize: 11, color: C.g8, marginBottom: 14 }}>{sel.t}{sel.lk && !admin ? " - gesperrt" : ""}</div>
            {sel.lk && !admin && <div style={{ padding: 8, background: "#fff3e0", borderRadius: 4, fontSize: 11, color: C.g, marginBottom: 14 }}>CI-geschuetzt</div>}

            {ok(sel) && <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: C.g8, marginBottom: 4 }}>Position</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                <div><label style={{ fontSize: 9, color: C.g8 }}>X</label><input type="number" value={sel.x} onChange={function(e) { upd(sel.id, "x", +e.target.value); }} style={inp} /></div>
                <div><label style={{ fontSize: 9, color: C.g8 }}>Y</label><input type="number" value={sel.y} onChange={function(e) { upd(sel.id, "y", +e.target.value); }} style={inp} /></div>
              </div>
            </div>}
            {ok(sel) && (sel.t === "image" || sel.t === "rect" || sel.t === "shape" || sel.t === "logo") && <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: C.g8, marginBottom: 4 }}>Groesse</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                <div><label style={{ fontSize: 9, color: C.g8 }}>B</label><input type="number" value={sel.w} onChange={function(e) { upd(sel.id, "w", +e.target.value); }} style={inp} /></div>
                <div><label style={{ fontSize: 9, color: C.g8 }}>H</label><input type="number" value={sel.h || 0} onChange={function(e) { upd(sel.id, "h", +e.target.value); }} style={inp} /></div>
              </div>
            </div>}

            {sel.t === "image" && ok(sel) && <div style={{ marginBottom: 14 }}>
              <button onClick={function() { setUpId(sel.id); fRef.current.click(); }} style={Object.assign({}, btn1, { marginBottom: 6 })}>{sel.src ? "Ersetzen" : "Hochladen"}</button>
              {sel.src && <button onClick={function() { upd(sel.id, "src", null); }} style={Object.assign({}, btn2, { color: C.r })}>Entfernen</button>}
            </div>}

            {(sel.t === "rect" || sel.t === "shape") && ok(sel) && <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: C.g8, marginBottom: 4 }}>{sel.t === "shape" ? "Rahmenfarbe" : "Farbe"}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                {COLORS.map(function(c) {
                  var active = sel.t === "shape" ? sel.stroke === c.h : sel.fill === c.h;
                  return <button key={c.h} onClick={function() { if (sel.t === "shape") upd(sel.id, "stroke", c.h); else upd(sel.id, "fill", c.h); }} style={{ width: 24, height: 24, borderRadius: "50%", border: active ? "3px solid " + C.b : "2px solid rgba(0,0,0,0.08)", background: c.h, cursor: "pointer" }} />;
                })}
              </div>
              {sel.t === "shape" && <div style={{ marginTop: 10 }}>
                <div style={{ fontSize: 11, color: C.g8, marginBottom: 4 }}>Fuellfarbe</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                  <button onClick={function() { upd(sel.id, "fill", "none"); }} style={{ width: 24, height: 24, borderRadius: "50%", border: sel.fill === "none" ? "3px solid " + C.b : "2px solid rgba(0,0,0,0.08)", background: C.w, cursor: "pointer", position: "relative", overflow: "hidden" }}><div style={{ position: "absolute", top: "50%", left: -2, width: 30, height: 2, background: C.r, transform: "rotate(-45deg)" }} /></button>
                  {COLORS.map(function(c) { return <button key={c.h} onClick={function() { upd(sel.id, "fill", c.h); }} style={{ width: 24, height: 24, borderRadius: "50%", border: sel.fill === c.h ? "3px solid " + C.b : "2px solid rgba(0,0,0,0.08)", background: c.h, cursor: "pointer" }} />; })}
                </div>
              </div>}
            </div>}

            {sel.t === "text" && ok(sel) && <div>
              <div style={{ marginBottom: 14 }}><div style={{ fontSize: 11, color: C.g8, marginBottom: 4 }}>Text</div><textarea value={sel.tx} onChange={function(e) { upd(sel.id, "tx", e.target.value); }} rows={3} style={Object.assign({}, inp, { height: "auto", resize: "vertical", lineHeight: 1.4 })} /></div>
              <div style={{ marginBottom: 14 }}><div style={{ fontSize: 11, color: C.g8, marginBottom: 4 }}>Groesse</div><div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>{FSZ.map(function(s) { return <button key={s} onClick={function() { upd(sel.id, "fs", s); }} style={{ padding: "3px 7px", fontSize: 10, borderRadius: 3, border: "none", cursor: "pointer", background: sel.fs === s ? C.a : C.g1, color: sel.fs === s ? C.w : C.g9 }}>{s}</button>; })}</div></div>
              <div style={{ marginBottom: 14 }}><div style={{ fontSize: 11, color: C.g8, marginBottom: 4 }}>Gewicht</div><div style={{ display: "flex", border: "1px solid " + C.g5, borderRadius: 5, overflow: "hidden" }}>{FW.map(function(fw) { return <button key={fw.v} onClick={function() { upd(sel.id, "fw", fw.v); }} style={Object.assign({}, tbtn(sel.fw === fw.v), { fontWeight: fw.v, fontSize: 11 })}>{fw.l}</button>; })}</div></div>
              <div><div style={{ fontSize: 11, color: C.g8, marginBottom: 4 }}>Farbe</div><div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>{COLORS.map(function(c) { return <button key={c.h} onClick={function() { upd(sel.id, "c", c.h); }} style={{ width: 24, height: 24, borderRadius: "50%", border: sel.c === c.h ? "3px solid " + C.b : "2px solid rgba(0,0,0,0.08)", background: c.h, cursor: "pointer" }} />; })}</div></div>
            </div>}
          </div> : <div style={{ textAlign: "center", padding: "40px 12px", color: C.g8 }}>
            <div style={{ fontSize: 13, fontWeight: 500, color: C.g9 }}>Kein Element</div>
            <div style={{ fontSize: 12, marginTop: 4 }}>Element im Canvas anklicken.</div>
          </div>}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
